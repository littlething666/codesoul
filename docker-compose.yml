# Neo4j 5.26 LTS service used by the @codesoul/graph-store-neo4j adapter.
#
# Bring up locally with:
#   docker compose up -d neo4j
#
# Run integration tests against it:
#   NEO4J_INTEGRATION_URL=bolt://localhost:7687 \
#   NEO4J_INTEGRATION_USER=neo4j \
#   NEO4J_INTEGRATION_PASSWORD=password \
#   pnpm --filter @codesoul/graph-store-neo4j test
#
# Production deployments should resolve `neo4j:5.26-community` to a
# digest in the deployment lockfile per the planning doc's pin policy.

services:
  neo4j:
    image: neo4j:5.26-community
    container_name: codesoul-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_server_memory_heap_initial__size: 2G
      NEO4J_server_memory_heap_max__size: 4G
      NEO4J_server_memory_pagecache_size: 2G
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:7474/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  neo4j-data:
