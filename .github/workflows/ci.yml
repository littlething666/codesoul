name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-$ github.workflow -$ github.ref 
  cancel-in-progress: true

jobs:
  ci:
    name: build + typecheck + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build must succeed before we attempt typecheck or tests:
      # downstream packages consume the built dist/ outputs.
      - name: Build
        run: pnpm -r build

      # Run typecheck and tests independently, surfacing both sets of
      # errors in a single CI run instead of bailing on the first failure.
      - name: Typecheck
        id: typecheck
        run: pnpm -r typecheck
        continue-on-error: true

      - name: Unit tests
        id: test
        run: pnpm -r test
        continue-on-error: true

      - name: Fail if typecheck or tests failed
        if: steps.typecheck.outcome == 'failure' || steps.test.outcome == 'failure'
        run: |
          echo "typecheck outcome: $ steps.typecheck.outcome "
          echo "test outcome:      $ steps.test.outcome "
          exit 1
