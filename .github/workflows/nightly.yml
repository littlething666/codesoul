name: nightly

on:
  schedule:
    # Daily at 06:17 UTC. Off-peak for shared GHA runners; the offset
    # minute reduces collision with the top-of-hour cron herd.
    - cron: "17 6 * * *"
  workflow_dispatch:

jobs:
  determinism:
    name: index-rebuild determinism
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build is required because the CLI imports built dist/ outputs
      # from sibling workspace packages.
      - name: Build
        run: pnpm -r build

      - name: Index rebuild determinism check
        run: bash scripts/check-index-determinism.sh
